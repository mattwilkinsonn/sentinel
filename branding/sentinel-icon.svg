<svg width="400" height="420" viewBox="0 0 56 58" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer shield -->
  <path d="M28 3 L50 11 L50 33 L28 55 L6 33 L6 11 Z" stroke="#5b21b6" stroke-width="2.5" stroke-linejoin="round" fill="none"/>
  <!-- Inner hex (faint) -->
  <path d="M28 13 L42 19 L42 31 L28 43 L14 31 L14 19 Z" stroke="#7c3aed" stroke-width="1.2" stroke-linejoin="round" fill="none" opacity="0.4"/>
  <!-- Rune: vertical stem from top point to center node -->
  <line x1="28" y1="3" x2="28" y2="22" stroke="#5b21b6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Rune: left diagonal arm -->
  <line x1="28" y1="22" x2="19" y2="31" stroke="#5b21b6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Rune: right diagonal arm -->
  <line x1="28" y1="22" x2="37" y2="31" stroke="#5b21b6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Rune: left descender -->
  <line x1="19" y1="31" x2="19" y2="40" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round" opacity="0.65"/>
  <!-- Rune: right descender -->
  <line x1="37" y1="31" x2="37" y2="40" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round" opacity="0.65"/>
  <!-- Center node -->
  <circle cx="28" cy="22" r="3.5" fill="#5b21b6"/>
</svg>
