repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
        exclude: tsconfig.*\.json$
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        args: ["-d", "{extends: default, rules: {line-length: {max: 150}, document-start: disable}}"]

  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        name: cargo fmt
        entry: cargo fmt --manifest-path sentinel-backend/Cargo.toml --
        pass_filenames: false
        types: [rust]
      - id: cargo-check
        name: cargo check
        entry: cargo check --manifest-path sentinel-backend/Cargo.toml --quiet
        pass_filenames: false
        types: [rust]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.0
    hooks:
      - id: markdownlint-cli2

  - repo: local
    hooks:
      - id: biome
        name: biome (lint + format)
        language: system
        entry: bunx biome check --write .
        files: \.(ts|tsx)$
        pass_filenames: false
      - id: prettier-move
        name: prettier (move)
        language: system
        entry: >-
          sh -c 'cd ts-scripts && bunx prettier
          --plugin @mysten/prettier-plugin-move --write
          "../move-contracts/*/sources/**/*.move"
          "../move-contracts/*/tests/**/*.move"'
        files: \.move$
        pass_filenames: false
