name: Deploy (dev)

"on":
  workflow_call:
    secrets:
      AWS_ROLE_ARN:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true
      NEON_API_KEY:
        required: true
      NEON_ORG_ID:
        required: true

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install SST
        run: curl -fsSL https://sst.dev/install | bash

      - name: Cache SST providers
        uses: actions/cache@v5
        with:
          path: infrastructure/.sst
          key: sst-dev-${{ hashFiles('infrastructure/sst.config.ts') }}
          restore-keys: sst-dev-

      - name: Deploy
        run: |
          export PATH=$HOME/.sst/bin:$PATH
          cd infrastructure && sst install && sst deploy --stage dev
        env:
          IMAGE_TAG: ${{ github.sha }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_ORG_ID: ${{ secrets.NEON_ORG_ID }}
