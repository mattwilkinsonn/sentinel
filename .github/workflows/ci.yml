name: CI

"on":
  push:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always

jobs:
  contracts:
    name: Move Contracts
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Sui CLI
        run: |
          SUI_VERSION=$(curl -sS "https://api.github.com/repos/MystenLabs/sui/releases/latest" | jq -r '.tag_name')
          curl -sSfL "https://github.com/MystenLabs/sui/releases/download/${SUI_VERSION}/sui-${SUI_VERSION}-ubuntu-aarch64.tgz" -o sui.tgz
          tar -xzf sui.tgz
          sudo mv sui /usr/local/bin/
          rm sui.tgz
          sui --version

      - name: Build sentinel contracts
        run: cd move-contracts/sentinel && sui move build

      - name: Test sentinel contracts
        run: cd move-contracts/sentinel && sui move test

  backend:
    name: Rust Backend
    runs-on: ubuntu-24.04-arm
    permissions:
      packages: write
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sentinel
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sentinel"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://sentinel:sentinel@localhost/sentinel
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sentinel-backend

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Clone Sui proto definitions
        run: |
          cd sentinel-backend && mkdir -p proto
          git clone --depth 1 https://github.com/MystenLabs/sui-apis.git proto/sui-apis

      - name: Check
        run: cd sentinel-backend && cargo check

      - name: Unit tests
        run: cd sentinel-backend && cargo test --lib

      - name: Mock tests (gRPC + GraphQL)
        run: cd sentinel-backend && cargo test --test grpc_mock_tests --test graphql_mock_tests

      - name: Live tests (gRPC against Sui testnet)
        run: cd sentinel-backend && cargo test --test grpc_integration_tests -- --ignored

      - name: Integration tests
        run: cd sentinel-backend && cargo test --test db_integration

      - name: Build release
        run: cd sentinel-backend && cargo build --release

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: sentinel-backend
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend:
    name: Solid.js Frontend
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd frontend && bun install

      - name: Type check + build
        run: cd frontend && bun run build

      - name: Test
        run: cd frontend && bun run test

  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: cd frontend && bun install && cd ../ts-scripts && bun install

      - name: Biome (lint + format)
        run: bunx biome check .

      - name: Prettier (Move)
        run: cd ts-scripts && bun run fmt:move:check
