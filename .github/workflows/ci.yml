name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  contracts:
    name: Move Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Sui CLI
        run: |
          curl -sSfL https://raw.githubusercontent.com/MystenLabs/suiup/main/install.sh | sh
          suiup install sui --yes
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build sentinel contracts
        run: cd move-contracts/sentinel && sui move build

      - name: Test sentinel contracts
        run: cd move-contracts/sentinel && sui move test

  backend:
    name: Rust Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sentinel
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sentinel"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://sentinel:sentinel@localhost/sentinel
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sentinel-backend

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Clone Sui proto definitions
        run: |
          cd sentinel-backend && mkdir -p proto
          git clone --depth 1 https://github.com/MystenLabs/sui-apis.git proto/sui-apis

      - name: Check
        run: cd sentinel-backend && cargo check

      - name: Unit tests
        run: cd sentinel-backend && cargo test --lib

      - name: Integration tests
        run: cd sentinel-backend && cargo test --test db_integration

      - name: Build release
        run: cd sentinel-backend && cargo build --release

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: sentinel-backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend:
    name: Solid.js Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd frontend && bun install

      - name: Type check + build
        run: cd frontend && bun run build

      - name: Test
        run: cd frontend && bun run test

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: cd frontend && bun install && cd ../ts-scripts && bun install

      - name: Biome (lint + format)
        run: bunx biome check

      - name: Prettier (Move)
        run: cd ts-scripts && bun run fmt:move:check

  deploy:
    name: Deploy
    needs: [contracts, backend, frontend, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install SST
        run: curl -fsSL https://sst.dev/install | bash

      - name: Cache SST providers
        uses: actions/cache@v4
        with:
          path: infrastructure/.sst
          key: sst-${{ hashFiles('infrastructure/sst.config.ts') }}
          restore-keys: sst-

      - name: Deploy
        run: |
          export PATH=$HOME/.sst/bin:$PATH
          cd infrastructure && sst install && sst deploy --stage production
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_ORG_ID: ${{ secrets.NEON_ORG_ID }}
          SENTINEL_PACKAGE_ID: ${{ secrets.SENTINEL_PACKAGE_ID }}
          THREAT_REGISTRY_ID: ${{ secrets.THREAT_REGISTRY_ID }}
          SENTINEL_ADMIN_CAP_ID: ${{ secrets.SENTINEL_ADMIN_CAP_ID }}
          ADMIN_PRIVATE_KEY: ${{ secrets.ADMIN_PRIVATE_KEY }}
          WORLD_PACKAGE_ID: ${{ secrets.WORLD_PACKAGE_ID }}
          BUILDER_PACKAGE_ID: ${{ secrets.BUILDER_PACKAGE_ID }}
          BOUNTY_BOARD_ID: ${{ secrets.BOUNTY_BOARD_ID }}
