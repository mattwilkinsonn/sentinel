name: Deploy (production)

"on":
  workflow_call:
    secrets:
      AWS_ROLE_ARN:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true
      NEON_API_KEY:
        required: true
      NEON_ORG_ID:
        required: true
      PULUMI_ACCESS_TOKEN:
        required: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
      contents: read
    env:
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install Neon provider
        run: |
          curl -fsSL https://get.pulumi.com | sh
          export PATH=$HOME/.pulumi/bin:$PATH
          cd infrastructure && pulumi package add terraform-provider kislerdm/neon

      - name: Install dependencies
        run: cd infrastructure && bun install

      - name: Build frontend
        run: cd frontend && bun install && bun run build
        env:
          VITE_API_URL: /api
          VITE_SUI_RPC_URL: https://fullnode.testnet.sui.io:443
          VITE_WORLD_PACKAGE_ID: "0x28b497559d65ab320d9da4613bf2498d5946b2c0ae3597ccfda3072ce127448c"
          VITE_BUILDER_PACKAGE_ID: "0x2df819a1e5a5b21044931b2619cdb8e67d7ff0d22a138fabd94b18d73a795358"
          VITE_EXTENSION_CONFIG_ID: "0xadcccc30fa3f13b084020ee72977268950d24047b653772335991cbace1f4194"
          VITE_BOUNTY_BOARD_ID: "0x6fafed6fd8a529c404029addb34f5688f1cf8131aad5d92a3ab5de4036566288"

      - name: Deploy with Pulumi
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: Zireael/sentinel/production
          work-dir: infrastructure
          upsert: true
          config-map: '{"sentinel:imageTag":{"value":"${{ github.sha }}"},"sentinel:neonOrgId":{"value":"${{ secrets.NEON_ORG_ID }}"}}'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

      - name: Upload frontend to S3
        run: |
          BUCKET=$(cd infrastructure && pulumi stack output siteBucketName -s Zireael/sentinel/production)
          CDN_ID=$(cd infrastructure && pulumi stack output cdnDistributionId -s Zireael/sentinel/production)
          aws s3 sync frontend/dist "s3://$BUCKET" --delete
          aws cloudfront create-invalidation --distribution-id "$CDN_ID" --paths "/*"

      - name: Wait for ECS service to stabilize
        run: |
          CLUSTER="sentinel-production"
          SERVICE="sentinel-production-backend"
          LOG_GROUP="/sentinel/production/backend"
          DEADLINE=$(( $(date +%s) + 600 ))

          while true; do
            NOW=$(date +%s)
            if [ "$NOW" -ge "$DEADLINE" ]; then
              echo "Timed out waiting for service to stabilize"
              echo "--- Recent CloudWatch logs ---"
              aws logs tail "$LOG_GROUP" --since 10m --format short || true
              exit 1
            fi

            SVC_JSON=$(aws ecs describe-services \
              --cluster "$CLUSTER" --services "$SERVICE" \
              --query "services[0]" --output json)
            STATUS=$(echo "$SVC_JSON" | jq -r '.deployments[0].rolloutState')
            RUNNING=$(echo "$SVC_JSON" | jq -r '.runningCount')
            DESIRED=$(echo "$SVC_JSON" | jq -r '.desiredCount')
            echo "$(date -u +%H:%M:%S) rolloutState=$STATUS running=$RUNNING desired=$DESIRED"

            if [ "$STATUS" = "COMPLETED" ] && [ "$RUNNING" = "$DESIRED" ]; then
              echo "Service stable"
              break
            fi

            if [ "$STATUS" = "FAILED" ]; then
              echo "ECS deployment failed — printing logs"
              aws logs tail "$LOG_GROUP" --since 10m --format short || true
              aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
                --query "services[0].events[:10]" --output table || true
              exit 1
            fi

            sleep 15
          done
