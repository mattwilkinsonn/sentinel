name: Deploy (production)

"on":
  workflow_call:
    secrets:
      AWS_ROLE_ARN:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true
      NEON_API_KEY:
        required: true
      NEON_ORG_ID:
        required: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install SST
        run: curl -fsSL https://sst.dev/install | bash

      - name: Cache SST providers
        uses: actions/cache@v5
        with:
          path: infrastructure/.sst
          key: sst-production-${{ hashFiles('infrastructure/sst.config.ts') }}
          restore-keys: sst-production-

      - name: Deploy
        run: |
          export PATH=$HOME/.sst/bin:$PATH
          cd infrastructure && sst install && sst deploy --stage production
        env:
          IMAGE_TAG: ${{ github.sha }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_ORG_ID: ${{ secrets.NEON_ORG_ID }}

      - name: Wait for ECS service to stabilize
        run: |
          CLUSTER=$(aws resourcegroupstaggingapi get-resources \
            --tag-filters Key=sst:app,Values=sentinel Key=sst:stage,Values=production \
            --resource-type-filters ecs:cluster \
            --query 'ResourceTagMappingList[0].ResourceARN' --output text)
          SERVICE=$(aws resourcegroupstaggingapi get-resources \
            --tag-filters Key=sst:app,Values=sentinel Key=sst:stage,Values=production \
            --resource-type-filters ecs:service \
            --query 'ResourceTagMappingList[0].ResourceARN' --output text)
          echo "Cluster: $CLUSTER"
          echo "Service: $SERVICE"

          LOG_GROUP="/sst/sentinel/production/backend"
          DEADLINE=$(( $(date +%s) + 600 ))

          while true; do
            NOW=$(date +%s)
            if [ "$NOW" -ge "$DEADLINE" ]; then
              echo "Timed out waiting for service to stabilize"
              echo "--- Recent CloudWatch logs ---"
              aws logs tail "$LOG_GROUP" --since 10m --format short || true
              exit 1
            fi

            SVC_JSON=$(aws ecs describe-services \
              --cluster "$CLUSTER" --services "$SERVICE" \
              --query "services[0]" --output json)
            STATUS=$(echo "$SVC_JSON" | jq -r '.deployments[0].rolloutState')
            RUNNING=$(echo "$SVC_JSON" | jq -r '.runningCount')
            DESIRED=$(echo "$SVC_JSON" | jq -r '.desiredCount')
            TASK_DEF=$(echo "$SVC_JSON" | jq -r '.deployments[0].taskDefinition | split("/")[-1]')
            echo "$(date -u +%H:%M:%S) rolloutState=$STATUS running=$RUNNING desired=$DESIRED taskDef=$TASK_DEF"

            if [ "$STATUS" = "COMPLETED" ] && [ "$RUNNING" = "$DESIRED" ]; then
              echo "Service stable"
              break
            fi

            if [ "$STATUS" = "FAILED" ]; then
              echo "ECS deployment failed â€” printing logs"
              echo "--- Recent CloudWatch logs ---"
              aws logs tail "$LOG_GROUP" --since 10m --format short || true
              echo "--- Service events ---"
              aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
                --query "services[0].events[:10]" --output table || true
              exit 1
            fi

            sleep 15
          done
