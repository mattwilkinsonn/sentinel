name: Deploy (production)

"on":
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install SST
        run: curl -fsSL https://sst.dev/install | bash

      - name: Cache SST providers
        uses: actions/cache@v4
        with:
          path: infrastructure/.sst
          key: sst-production-${{ hashFiles('infrastructure/sst.config.ts') }}
          restore-keys: sst-production-

      - name: Deploy
        run: |
          export PATH=$HOME/.sst/bin:$PATH
          cd infrastructure && sst install && sst deploy --stage production
        env:
          IMAGE_TAG: ${{ github.sha }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_ORG_ID: ${{ secrets.NEON_ORG_ID }}
          ADMIN_PRIVATE_KEY: ${{ secrets.ADMIN_PRIVATE_KEY }}
